[project]
name = "model-service"
version = "0.1.0"
description = "Model training and inference service"
requires-python = ">=3.11,<3.13"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.6",
    "pydantic>=2.8.2",
    "pyqlib>=0.9.6",
    "torch==2.10.0",
    "numpy>=1.26.4",
    "pandas>=2.2.2",
    "yfinance>=0.2.43",
    "yahooquery>=2.4.1",
    "fake-useragent>=2.2.0",
    # mlflow 1.x (pulled in by pyqlib) imports google.protobuf.service,
    # which was removed from newer protobuf major versions.
    "protobuf>=3.12.0,<4",
]

[project.optional-dependencies]
dev = [
    "httpx>=0.27.2",
    "pytest>=8.3.2",
    "pytest-asyncio>=0.23.8",
]

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
addopts = "-p no:cacheprovider"

[tool.uv]
dev-dependencies = [
    "httpx>=0.27.2",
    "pytest>=8.3.2",
    "pytest-asyncio>=0.23.8",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'win32' or sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://mirror.sjtu.edu.cn/pytorch-wheels/cu128"
explicit = true

apiVersion: v1
kind: Service
metadata:
  name: trader-internal
  namespace: trading
  annotations:
    # Istio service mesh annotations
    sidecar.istio.io/inject: "true"
spec:
  selector:
    app: trader
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 9090
      targetPort: 9090
      protocol: TCP
  type: ClusterIP
---
# PeerAuthentication for mTLS enforcement
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: trader-mtls
  namespace: trading
spec:
  selector:
    matchLabels:
      app: trader
  mtls:
    mode: STRICT
---
# VirtualService for traffic management
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: trader-vs
  namespace: trading
spec:
  hosts:
    - trader-internal
  http:
    - match:
        - uri:
            prefix: /api/v1
      route:
        - destination:
            host: trader-internal
            port:
              number: 80
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 3s

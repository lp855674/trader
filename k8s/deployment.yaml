apiVersion: apps/v1
kind: Deployment
metadata:
  name: trader
  namespace: trading
  labels:
    app: trader
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trader
  template:
    metadata:
      labels:
        app: trader
    spec:
      serviceAccountName: trader-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: trader
          image: trader:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: RUST_LOG
              value: "info"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trader-secrets
                  key: database-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: trader-config
        - name: data
          persistentVolumeClaim:
            claimName: trader-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: trader-svc
  namespace: trading
spec:
  selector:
    app: trader
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
  type: ClusterIP

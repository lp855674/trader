apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: trader-repo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/your-org/trader
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: trader-infra
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s
  prune: true
  sourceRef:
    kind: GitRepository
    name: trader-repo
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: trader
      namespace: trading
  postBuild:
    substitute:
      IMAGE_TAG: latest

# Deployment example for trader-server.
# Copy this file outside the release directory, then point TRADER_SERVER_CONFIG at it.
# Run-specific backtest, replay, paper, and live settings are supplied per launch request.

[database]
url = "sqlite:///var/lib/trader/trader.sqlite"

[server]
bind = "127.0.0.1:8080"

[logging]
enabled = true
level = "info"
buffer_size = 1000
flush_interval_ms = 5000
retention_days = 30
console_output = true

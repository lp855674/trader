# Deployment example for trader-server.
# Copy this file outside the release directory, then point TRADER_CONFIG at it.
# trader-server only parses this file at startup; data-source paths can be updated later
# before running backtest / paper / replay / live operations through CLI or API.

[runtime]
mode = "backtest"
run_id = "server-default"

[database]
url = "sqlite:///var/lib/trader/trader.sqlite"

[data]
source = "csv"
path = "/var/lib/trader/datasets/sample/aapl_1d.csv"

[strategy]
name = "moving_average_cross"
symbols = ["US:NASDAQ:AAPL:EQUITY"]
fast_window = 2
slow_window = 3

[portfolio]
initial_cash = "100000"
base_currency = "USD"
order_qty = "1"
max_abs_qty = "100"

[risk]
max_order_notional = "1000000"
min_cash_after_order = "0"
max_exposure = "1000000"
max_drawdown = "1"
max_leverage = "10"
max_margin_used = "0"
trading_halted = false

[broker]
kind = "simulated"
mode = "paper"

[paper]
account_id = "paper"
slippage_bps = "25"
fee_bps = "10"

[live]
enabled = false

[logging]
enabled = true
level = "info"
buffer_size = 1000
flush_interval_ms = 5000
retention_days = 30
console_output = true

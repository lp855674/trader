[runtime]
mode = "paper"
run_id = "binance-testnet-readonly"

[database]
url = "sqlite://data/binance/databases/binance-testnet.sqlite"

[data]
source = "csv"
path = "datasets/sample/aapl_1d.csv"

[strategy]
name = "moving_average_cross"
symbols = ["CRYPTO:BINANCE:BTCUSDT:CRYPTO_SPOT"]
fast_window = 2
slow_window = 3

[portfolio]
initial_cash = "100000"
base_currency = "USDT"
order_qty = "0.001"
max_abs_qty = "1"

[risk]
max_order_notional = "50"
min_cash_after_order = "10"
max_exposure = "1000"
max_drawdown = "0.2"
max_leverage = "1"
max_margin_used = "0"
trading_halted = false

[broker]
kind = "binance"
mode = "paper"
base_url = "https://testnet.binance.vision/api"
api_key_env = "BINANCE_TESTNET_API_KEY"
secret_key_env = "BINANCE_TESTNET_SECRET_KEY"
recv_window_ms = 5000
order_submit_enabled = false

[paper]
account_id = "binance-testnet"
slippage_bps = "5"
fee_bps = "10"

[live]
enabled = false

[live.startup_recovery]
unmatched_open_orders = "fail"

[live.alerts]
enabled = false
cooldown_ms = 300000
webhook_timeout_ms = 3000
webhook_max_retries = 2

[[live.alerts.sinks]]
sink = "file"
file_path = "target/runtime-alerts.jsonl"

[[live.alerts.sinks]]
sink = "webhook"
webhook_url = "http://127.0.0.1:18080/alerts"

[logging]
enabled = true
level = "info"
buffer_size = 1000
flush_interval_ms = 5000
retention_days = 30
console_output = true

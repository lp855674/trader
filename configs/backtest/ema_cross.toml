[runtime]
mode = "backtest"
run_id = "sample-ema-cross"

[database]
url = "sqlite://data/trader-ema-cross.sqlite"

[data]
source = "csv"
path = "datasets/sample/aapl_1d.csv"

[strategy]
name = "exponential_moving_average_cross"
alpha = "exponential_moving_average_cross"
symbols = ["US:NASDAQ:AAPL:EQUITY"]
fast_window = 2
slow_window = 3

[portfolio]
initial_cash = "100000"
base_currency = "USD"
order_qty = "1"
max_abs_qty = "100"

[risk]
max_order_notional = "1000000"
min_cash_after_order = "0"
max_exposure = "1000000"
max_drawdown = "1"
max_leverage = "10"
max_margin_used = "0"
trading_halted = false
allow_short = true

[broker]
kind = "simulated"
mode = "paper"

[paper]
account_id = "paper"
slippage_bps = "25"
fee_bps = "10"

[live]
enabled = false

[runtime]
mode = "backtest"
run_id = "sample-net-signal-alpha-ma-cross"

[database]
url = "sqlite://data/backtest/trader-net-signal-alpha.sqlite"

[data]
source = "csv"
path = "datasets/sample/aapl_1d.csv"

[strategy]
name = "moving_average_cross"
alpha = "moving_average_cross"
alpha_conflict_resolution = "net_signal"
symbols = ["US:NASDAQ:AAPL:EQUITY"]
fast_window = 2
slow_window = 3

[[strategy.alpha_components]]
name = "moving_average_cross"
fast_window = 1
slow_window = 2
weight = 1.0

[[strategy.alpha_components]]
name = "moving_average_cross"
fast_window = 2
slow_window = 1
weight = 0.25

[portfolio]
initial_cash = "100000"
base_currency = "USD"
order_qty = "1"
max_abs_qty = "100"

[risk]
max_order_notional = "1000000"
min_cash_after_order = "0"
max_exposure = "1000000"
max_drawdown = "1"
max_leverage = "10"
max_margin_used = "0"
trading_halted = false
allow_short = true

[broker]
kind = "simulated"
mode = "paper"

[paper]
account_id = "paper"
slippage_bps = "25"
fee_bps = "10"

[live]
enabled = false

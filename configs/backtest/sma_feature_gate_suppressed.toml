[runtime]
mode = "backtest"
run_id = "sample-sma-feature-gate-suppressed"

[database]
url = "sqlite://data/sma_feature_gate_suppressed.sqlite"

[data]
source = "csv"
path = "datasets/sample/aapl_1d.csv"

[strategy]
name = "moving_average_cross"
symbols = ["US:NASDAQ:AAPL:EQUITY"]
fast_window = 2
slow_window = 3

[strategy.alpha_gate]
source = "parquet"
path = "datasets/features/aapl_sma_2.parquet"
manifest_path = "datasets/features/aapl_sma_2.manifest.json"
run_id = "research-sample-sma"
feature_name = "sma_close_2"
version = "v1"
build_indicator = "sma"
build_period = 2
build_value_column = "close"
min_value = "1000"

[portfolio]
initial_cash = "100000"
base_currency = "USD"
order_qty = "1"
max_abs_qty = "100"

[risk]
max_order_notional = "1000000"
min_cash_after_order = "0"
max_exposure = "1000000"
max_drawdown = "1"
max_leverage = "10"
max_margin_used = "0"
trading_halted = false

[broker]
kind = "simulated"
mode = "paper"

[paper]
account_id = "paper"
slippage_bps = "25"
fee_bps = "10"

[live]
enabled = false
